name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 3 AM UTC every Monday, Wednesday, Friday
    - cron: '0 3 * * 1,3,5'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp -r html/* deploy/
          mkdir -p deploy/spa
          cp -r dist/* deploy/spa/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
