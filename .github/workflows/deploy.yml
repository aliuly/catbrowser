name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 3 AM UTC every Monday, Wednesday, Friday
    - cron: '0 3 * * 1,3,5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    #~ permissions:
      #~ contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install requests

      - name: Generate prices.json
        run: python3 price_api.py region=eu-de,eu-nl > public/prices.json

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp -r html/* deploy/ 2>/dev/null || true
          touch deploy/.nojekyll
          mkdir -p deploy/spa
          cp -r dist/* deploy/spa/

      - name: Upload Pages artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

      # Deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      #~ - name: Deploy to gh-pages
        #~ uses: peaceiris/actions-gh-pages@v4
        #~ with:
          #~ github_token: ${{ secrets.GITHUB_TOKEN }}
          #~ publish_dir: ./deploy
