<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CatBrowser</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      color: #262626;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Magenta top bar */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #e20074;
      z-index: 1;
    }
    main {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #262626;
      margin-bottom: 8px;
    }
    p {
      color: #4c4c4c;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    a {
      display: inline-block;
      padding: 14px 40px;
      background: #e20074;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.15s;
    }
    a:hover { background: #b80060; }
    .version {
      margin-top: 24px;
      font-size: 13px;
      color: #bbb;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <h1>&#x1F431; CatBrowser</h1>
    <p>
      Browse and filter cloud service pricing data.
      Explore thousands of SKUs across regions, service types,
      and product families with grouped views and live filters.
    </p>
    <a href="spa/">Open CatBrowser</a>
    <div class="version">{{VERSION}}</div>
  </main>
  <footer>Powered by Tabulator &amp; React</footer>
</body>
</html>
